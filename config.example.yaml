# Forge Framework Configuration
# Global config: ~/.forge.yaml (student + university, shared across all labs)
# Project config: ./forge.yaml (inherits global, adds subject + lab details)

student:
  name: "Ivanov Ivan Ivanovich"
  name_short: "I.I. Ivanov"   # initials + surname (for title page)
  group: "IU7-43B"

university:
  name: "Bauman Moscow State Technical University"
  short: "MSTU"
  department: "Department # "     # faculty/department
  city: "Moscow"

subject:
  name: "Probability Theory"
  teacher: "Petrov P.P."
  teacher_position: ""         # position, degree, title (optional)

lab:
  number: 1
  title: ""           # auto-filled from guide PDF
  variant: 0           # 0 = not applicable
  type: "math"         # math | code | mixed
  language: "russian"  # report language
  code_language: ""    # c++, python, etc. (auto-detected or from guide)

# Sandbox runtime (Daytona). All compilation, execution, pip and Typst run here,
# never on the host. The CLI binds one sandbox per project directory.
runtime:
  remote_workdir: "/home/daytona/work"
  daytona:
    # Pick one of: snapshot (preferred, fastest start) or image.
    # Leave both empty to use the Daytona default base image — bootstrap below
    # will install g++, cmake, python, Typst and DejaVu fonts on first start.
    snapshot: ""        # e.g. "forge-lab-debian-bookworm"
    image: ""           # e.g. "ubuntu:24.04"
    api_key: ""         # leave empty to use DAYTONA_API_KEY from env / .env
    api_url: ""         # leave empty to use DAYTONA_API_URL from env
    target: ""          # leave empty to use DAYTONA_TARGET from env
    public: false
    auto_stop_minutes: 15      # idle timeout before sandbox auto-stops
    auto_delete_minutes: null  # null = never auto-delete
    env: {}             # extra env vars exposed to every command
    # bootstrap: ""    # uncomment to override; "" skips bootstrap entirely.
    #                  # default installs build-essential, g++, cmake, ninja,
    #                  # python3+pip, fonts-dejavu, Typst (latest release)
    #                  # once per sandbox; see forge_runtime/config.py.