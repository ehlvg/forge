# Forge Framework Configuration
# ──────────────────────────────────────────────
# Global config: ~/.forge.yaml
#   Stores student, university, and language preferences.
#   These values are saved once and reused across all labs.
#   During /init, Forge reads this file and skips asking again.
#
# Project config: ./forge.yaml
#   Inherits global values and adds subject + lab details.
# ──────────────────────────────────────────────

# ── ~/.forge.yaml (global, saved once) ────────
# student:
#   name: "Ivanov Ivan Ivanovich"
#   name_short: "I.I. Ivanov"     # initials + surname (for title page)
#   group: "IU7-43B"
# university:
#   name: "Bauman Moscow State Technical University"
#   short: "MSTU"
#   department: "Department # "   # faculty/department
#   city: "Moscow"
# language: "russian"             # report language: "russian" or "english"

# ── ./forge.yaml (per-project) ────────────────
student:
  name: "Ivanov Ivan Ivanovich"
  name_short: "I.I. Ivanov"     # initials + surname (for title page)
  group: "IU7-43B"

university:
  name: "Bauman Moscow State Technical University"
  short: "MSTU"
  department: "Department # "     # faculty/department
  city: "Moscow"

subject:
  name: "Probability Theory"
  teacher: "Petrov P.P."
  teacher_position: ""         # position, degree, title (optional)

lab:
  number: 1
  title: ""           # auto-filled from guide PDF
  variant: 0           # 0 = not applicable
  type: "math"         # math | code | mixed
  language: "russian"  # report language: "russian" or "english"
  code_language: ""    # c++, python, etc. (auto-detected or from guide)